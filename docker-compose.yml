version: "3.9"

services:
  divikbox:
    build: .
    container_name: divik-box-foh
    environment:
      - UPSTREAM_LLM_URL=http://localhost:8001/upstream
      - REDIS_URL=redis://redis:6379/0
      - REDIS_POOL_SIZE=10
      - PHRASE_MAX_WINDOW=32
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: divikbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
